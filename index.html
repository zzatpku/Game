<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>未名湖守护鸭 Demo</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%235fb8c5'/%3E%3Cellipse cx='31' cy='38' rx='22' ry='14' fill='%23f1d85a'/%3E%3Ccircle cx='42' cy='27' r='11' fill='%23f6e980'/%3E%3Cpath d='M52 28l10 4-10 4z' fill='%23e06f2a'/%3E%3Ccircle cx='45' cy='24' r='2.2' fill='%2316302e'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="styles.css">
    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="topbar" aria-label="game status">
        <div>
          <p class="eyebrow">Playable concept demo</p>
          <h1>未名湖守护鸭</h1>
        </div>
        <div class="meters">
          <div class="meter">
            <span>湖水清澈度</span>
            <strong id="clarityValue">95%</strong>
            <div class="track"><i id="clarityBar"></i></div>
          </div>
          <div class="meter">
            <span>游客意识</span>
            <strong id="awarenessValue">12%</strong>
            <div class="track"><i id="awarenessBar"></i></div>
          </div>
          <div class="meter">
            <span>冲刺体力</span>
            <strong id="staminaValue">100%</strong>
            <div class="track track-gold"><i id="staminaBar"></i></div>
          </div>
          <div class="pill" id="scorePill">清理 0 / 14</div>
        </div>
      </section>

      <section class="gameframe" aria-label="game canvas">
        <div class="viewport-wrap">
          <canvas id="game" width="1280" height="720"></canvas>
          <div class="radar" aria-label="position radar">
            <span>位置雷达</span>
            <div class="radar-map" id="radarMap"></div>
          </div>
        </div>
        <div class="sidepanel">
          <div>
            <p class="panel-label">当前行动</p>
            <p class="panel-main" id="actionText">巡湖中</p>
          </div>
          <div>
            <p class="panel-label">最近垃圾位置</p>
            <p class="panel-main" id="nearestText">未发现</p>
          </div>
          <div>
            <p class="panel-label">任务进度</p>
            <p class="panel-main" id="missionText">守住未名湖</p>
          </div>
          <button id="actionButton" type="button">行动</button>
          <button id="restartButton" type="button">重新开始</button>
        </div>
      </section>

      <section class="bottom-strip" aria-label="controls">
        <span>前进/后退: W / S</span>
        <span>转向: A / D 或鼠标拖拽</span>
        <span>横移: Q / E</span>
        <span>冲刺: Shift</span>
        <span>鼠标锁定: 点击画面</span>
        <span>鸣叫/行动: Space</span>
        <span>目标: 优先清理红色污染热点并提醒游客</span>
      </section>
    </main>

    <section class="upgrade-modal" id="upgradeModal" aria-label="upgrade choice" hidden>
      <div class="upgrade-box">
        <p class="eyebrow">Upgrade unlocked</p>
        <h2>清理 10 件垃圾，选择一次升级</h2>
        <div class="upgrade-options">
          <button type="button" data-upgrade="capacity">
            <strong>双重叼取</strong>
            <span>一次最多携带 2 件垃圾，回收路线更有效率。</span>
          </button>
          <button type="button" data-upgrade="stamina">
            <strong>耐力鸭</strong>
            <span>体力上限提高到 150，冲刺消耗降低。</span>
          </button>
          <button type="button" data-upgrade="voice">
            <strong>响亮鸣叫</strong>
            <span>鸣叫范围扩大，游客冷静时间更长。</span>
          </button>
        </div>
      </div>
    </section>

    <script type="module" src="game.js?v=3"></script>
  </body>
</html>
